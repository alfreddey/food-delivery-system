server:
    port: 8082

spring:
  application:
    name: delivery-service
  datasource:
    url: jdbc:postgresql://localhost:5432/Delivery
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
      format_sql: true