customer:
    service:
        url: http://localhost:8080

server:
  port: 8082

spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/order
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}

    jpa:
        hibernate:
          ddl-auto: update
        show-sql: true
        properties:
          hibernate:
            format_sql: true